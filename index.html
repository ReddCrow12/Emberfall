<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emberfall — A Fantasy Adventure</title>
<link rel="stylesheet" href="css/style.css?v=6">
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="hud-left">
      <div class="hud-bars">
        <div class="bar hp"><div id="bar-hp-fill" class="bar-fill"></div><span id="hud-hp-text" class="bar-text"></span></div>
        <div class="bar mp"><div id="bar-mp-fill" class="bar-fill"></div><span id="hud-mp-text" class="bar-text"></span></div>
        <div class="bar xp"><div id="bar-xp-fill" class="bar-fill"></div><span id="hud-xp-text" class="bar-text"></span></div>
      </div>
      <div class="hud-info">
        <span id="hud-level" title="Level">Lv 1</span>
        <span id="hud-gold" title="Gold">🪙 0</span>
        <span id="hud-rep" title="Reputation">☆ 0</span>
        <span id="hud-zone" title="Location"></span>
      </div>
    </div>
    <div id="hud-right">
      <canvas id="minimap" width="120" height="120" title="Click to open the full map (M)"></canvas>
      <div id="zoom-controls">
        <button class="zoom-btn" id="zoom-out" title="Zoom out (−)">➖</button>
        <button class="zoom-btn" id="zoom-map" title="Full map (M)">🗺️</button>
        <button class="zoom-btn" id="zoom-in" title="Zoom in (+)">➕</button>
      </div>
      <div id="quest-tracker"></div>
    </div>
    <div id="hud-buttons">
      <button class="hud-btn" id="btn-inventory" title="Inventory (I)">🎒</button>
      <button class="hud-btn" id="btn-character" title="Character (C)">🧙</button>
      <button class="hud-btn" id="btn-quests" title="Quests (Q)">📜</button>
      <button class="hud-btn" id="btn-save" title="Save / Load">💾</button>
      <button class="hud-btn" id="btn-settings" title="Settings">⚙️</button>
    </div>
  </div>

  <div id="notif-area"></div>

  <!-- Touch controls -->
  <div id="touch-controls" class="hidden">
    <div id="dpad">
      <button class="dpad-btn" data-dir="up">▲</button>
      <button class="dpad-btn" data-dir="left">◀</button>
      <button class="dpad-btn" data-dir="right">▶</button>
      <button class="dpad-btn" data-dir="down">▼</button>
    </div>
    <button id="btn-action">✦</button>
  </div>

  <!-- Generic panel container -->
  <div id="panel-wrap" class="overlay hidden">
    <div id="panel" class="frame">
      <button class="close-x" id="panel-close">✕</button>
      <h2 id="panel-title"></h2>
      <div id="panel-body"></div>
    </div>
  </div>

  <!-- Dialogue -->
  <div id="dialogue-overlay" class="hidden">
    <div id="dialogue-box" class="frame">
      <div id="dialogue-name"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-options"></div>
    </div>
  </div>

  <!-- Crossroad / random events -->
  <div id="event-overlay" class="overlay hidden">
    <div id="event-box" class="frame">
      <h2 id="event-title"></h2>
      <div id="event-text"></div>
      <div id="event-options"></div>
    </div>
  </div>

  <!-- Combat -->
  <div id="combat-overlay" class="hidden">
    <div id="combat-arena">
      <canvas id="combat-canvas"></canvas>
      <div id="combat-enemies"></div>
    </div>
    <div id="combat-bottom" class="frame">
      <div id="combat-player">
        <div id="combat-player-name"></div>
        <div class="bar hp small"><div id="combat-hp-fill" class="bar-fill"></div><span id="combat-hp-text" class="bar-text"></span></div>
        <div class="bar mp small"><div id="combat-mp-fill" class="bar-fill"></div><span id="combat-mp-text" class="bar-text"></span></div>
        <div id="combat-status"></div>
      </div>
      <div id="combat-log"></div>
      <div id="combat-actions"></div>
    </div>
  </div>

  <!-- Full world map -->
  <div id="map-overlay" class="overlay hidden">
    <div class="frame wide" style="text-align:center">
      <button class="close-x" id="map-close">✕</button>
      <h2>🗺️ World Map</h2>
      <canvas id="map-canvas"></canvas>
      <div id="map-legend"></div>
    </div>
  </div>

  <!-- Build / decorate placement bar -->
  <div id="placement-bar" class="hidden">
    <span id="placement-text"></span>
    <button id="placement-confirm">✔ Place</button>
    <button id="placement-cancel">✖ Cancel</button>
  </div>

  <!-- Loot fanfare -->
  <div id="loot-popup" class="hidden"></div>

  <!-- Title screen -->
  <div id="title-screen">
    <div id="title-inner">
      <h1 id="game-title">EMBERFALL</h1>
      <p class="subtitle">A Tale of Dice &amp; Dragons</p>
      <div id="title-menu">
        <button class="menu-btn" id="btn-new-game">⚔️ New Adventure</button>
        <button class="menu-btn" id="btn-continue">📖 Continue</button>
      </div>
      <p class="title-hint">WASD / Arrows to move · E or Space to interact</p>
    </div>
  </div>

  <!-- Class select -->
  <div id="class-select" class="overlay hidden">
    <div class="frame wide">
      <h2>Choose Your Path</h2>
      <div id="class-cards"></div>
      <div id="name-row">
        <label>Hero's name: <input id="hero-name" maxlength="16" value="Adventurer"></label>
        <button class="menu-btn" id="btn-start-game" disabled>Begin the Journey</button>
      </div>
    </div>
  </div>

  <!-- Ending -->
  <div id="ending-screen" class="overlay hidden">
    <div class="frame">
      <h2 id="ending-title"></h2>
      <div id="ending-text"></div>
      <div id="ending-buttons"></div>
    </div>
  </div>

  <div id="fader"></div>
</div>

<script src="js/data.js?v=6"></script>
<script src="js/audio.js?v=6"></script>
<script src="js/world.js?v=6"></script>
<script src="js/items.js?v=6"></script>
<script src="js/quests.js?v=6"></script>
<script src="js/entities.js?v=6"></script>
<script src="js/events.js?v=6"></script>
<script src="js/foes.js?v=6"></script>
<script src="js/house.js?v=6"></script>
<script src="js/combat.js?v=6"></script>
<script src="js/save.js?v=6"></script>
<script src="js/ui.js?v=6"></script>
<script src="js/render.js?v=6"></script>
<script src="js/main.js?v=6"></script>
</body>
</html>
